<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crowlning Skills - Escape Room 2D</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000; color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        .oculto { display: none !important; }

        /* --- PANTALLA PRINCIPAL (HOME) --- */
        #pantalla-inicio {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #000000; z-index: 1000;
        }
        .imagen-fondo { width: 100%; max-width: 320px; height: auto; margin-bottom: 40px; }
        .boton-ingresar {
            background-color: transparent; color: #a855f7; border: 2px solid #a855f7;
            padding: 15px 50px; font-size: 20px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; border-radius: 30px; box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
            text-transform: uppercase; transition: 0.2s;
        }

        /* --- INTERFAZ DEL JUEGO --- */
        #contenedor-juego {
            width: 100%; height: 100%; display: flex; flex-direction: column;
        }
        
        /* Contenedor del mapa (60% del alto) */
        #zona-render {
            position: relative; width: 100%; height: 55%; background-color: #0c0c0c;
            border-bottom: 2px solid #222; box-sizing: border-box;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* Contenedor de controles e información (45% del alto) */
        #zona-controles {
            width: 100%; height: 45%; background-color: #050505;
            display: flex; position: relative; box-sizing: border-box; padding: 10px;
        }

        /* Panel Izquierdo: Mensajes e Inventario */
        .panel-info {
            width: 55%; height: 100%; display: flex; flex-direction: column;
            justify-content: space-between; padding-right: 10px; box-sizing: border-box;
        }
        .consola-texto {
            background: #000; border: 1px solid #333; color: #aaa;
            padding: 8px; font-size: 11px; height: 75%; overflow-y: auto; text-align: left;
        }
        .inventario { color: #a855f7; font-size: 12px; font-weight: bold; text-align: left; }

        /* Panel Derecho: Joystick Virtual */
        .panel-joystick {
            width: 45%; height: 100%; display: flex; align-items: center; justify-content: center;
        }
        #joystick-base {
            width: 110px; height: 110px; background: rgba(255,255,255,0.05);
            border: 2px solid #333; border-radius: 50%; position: relative;
        }
        #joystick-palanca {
            width: 45px; height: 45px; background: #a855f7; border-radius: 50%;
            position: absolute; top: 32px; left: 32px; box-shadow: 0 0 10px #a855f7;
        }

        /* --- POPUPS DE INTERACCIÓN / PUZZLES --- */
        .popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 360px; background: #111; border: 2px solid #a855f7;
            padding: 20px; text-align: center; box-sizing: border-box; z-index: 500;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
        }
        .btn-opcion {
            background: #222; color: #fff; border: 1px solid #555;
            padding: 12px; margin: 6px 0; width: 100%; cursor: pointer; font-family: monospace;
        }
        .btn-opcion:active { background: #a855f7; color: #000; }

        /* Efecto visual de daño */
        @keyframes flashRojo { 0% { background: rgba(255,0,0,0.4); } 100% { background: transparent; } }
        .daño-flash { animation: flashRojo 0.4s ease-out; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <img src="logo.jpg" alt="Crowlning Skills Logo" class="imagen-fondo">
        <button class="boton-ingresar" onclick="comenzarSimulador()">INGRESAR</button>
    </div>

    <div id="contenedor-juego" class="oculto">
        
        <div id="zona-render">
            <div id="efecto-daño" style="position:absolute; width:100%; height:100%; pointer-events:none; z-index:10;"></div>
            <canvas id="canvasJuego"></canvas>
        </div>

        <div id="zona-controles">
            
            <div class="panel-info">
                <div class="inventario">Fragmentos: <span id="txt-piezas">0</span> / 3</div>
                <div class="consola-texto" id="consola-txt">
                    > SISTEMA INICIADO.<br>
                    > Explora el cuarto con el joystick.<br>
                    > Inspecciona los escritorios grises chocando contra ellos para hallar pistas.
                </div>
            </div>

            <div class="panel-joystick">
                <div id="joystick-base">
                    <div id="joystick-palanca"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="popup-puzzle" class="popup oculto">
        <h3 style="color:#a855f7; margin-top:0;" id="puzzle-titulo">Cierre de Seguridad</h3>
        <p id="puzzle-desc" style="font-size:13px; line-height:1.4;"></p>
        <div id="contenedor-opciones"></div>
    </div>

    <script>
        // CONFIGURACIÓN DEL MOTOR DE JUEGO
        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        
        let juegoActivo = false;
        let piezas = 0;
        let panelAbierto = false;

        // Entidades físicas del mapa
        const jugador = { x: 50, y: 120, radio: 12, velocidad: 4, vx: 0, vy: 0 };
        
        // Elementos interactivos del cuarto (coordenadas adaptativas)
        let objetos = [];

        function inicializarObjetos() {
            objetos = [
                { x: 140, y: 40, w: 45, h: 45, tipo: 'escritorio', revisado: false, titulo: "Mesa de Redacción", texto: "Encontraste un fragmento de COE: 'La ambigüedad destruye la dirección técnica. Claridad ante todo.'" },
                { x: 60, y: 180, w: 45, h: 45, tipo: 'escritorio', revisado: false, titulo: "Terminal de Datos", texto: "Encontraste un fragmento de Álgebra: 'El sistema analizado es Linealmente Dependiente (LD). Se requiere precaución.'" },
                { x: 240, y: 160, w: 45, h: 45, tipo: 'escritorio', revisado: false, titulo: "Casillero Químico", texto: "Encontraste un fragmento de Laboratorio: 'Compuestos estables requieren enlaces de Puentes de Hidrógeno activos.'" },
                { x: canvas.width - 35, y: canvas.height / 2 - 35, w: 25, h: 70, tipo: 'puerta', titulo: "Puerta de Salida" }
            ];
        }

        // Redimensionar el área de juego
        function ajustarPantalla() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            inicializarObjetos();
        }
        window.addEventListener('resize', ajustarPantalla);

        function comenzarSimulador() {
            document.getElementById('pantalla-inicio').classList.add('oculto');
            document.getElementById('contenedor-juego').classList.remove('oculto');
            ajustarPantalla();
            juegoActivo = true;
             loopPrincipal();
        }

        /* ===================================================
           LÓGICA DEL JOYSTICK UNIVERSAL (POINTER EVENTS)
           =================================================== */
        const joyBase = document.getElementById('joystick-base');
        const joyPalanca = document.getElementById('joystick-palanca');
        let joyActivo = false;
        let joyCentroX = 0, joyCentroY = 0;

        joyBase.addEventListener('pointerdown', (e) => {
            joyActivo = true;
            joyBase.setPointerCapture(e.pointerId);
            const rect = joyBase.getBoundingClientRect();
            joyCentroX = rect.left + rect.width / 2;
            joyCentroY = rect.top + rect.height / 2;
            procesarMovimientoJoystick(e);
        });

        joyBase.addEventListener('pointermove', (e) => {
            if (joyActivo) procesarMovimientoJoystick(e);
        });

        joyBase.addEventListener('pointerup', (e) => {
            joyActivo = false;
            joyPalanca.style.transform = 'translate(0px, 0px)';
            jugador.vx = 0; jugador.vy = 0;
        });

        function procesarMovimientoJoystick(e) {
            if (panelAbierto) return;
            
            let dx = e.clientX - joyCentroX;
            let dy = e.clientY - joyCentroY;
            let distancia = Math.sqrt(dx*dx + dy*dy);
            const radioMax = 33; // Límite físico de la palanca

            if (distancia > radioMax) {
                dx = (dx / distancia) * radioMax;
                dy = (dy / distancia) * radioMax;
            }

            joyPalanca.style.transform = `translate(${dx}px, ${dy}px)`;

            // Convertir a vector de velocidad del jugador
            jugador.vx = (dx / radioMax) * jugador.velocidad;
            jugador.vy = (dy / radioMax) * jugador.velocidad;
        }

        /* ===================================================
           COLISIONES Y MOTOR FÍSICO
           =================================================== */
        function detectarColisiones() {
            // Límites del cuarto físico
            if (jugador.x - jugador.radio < 0) jugador.x = jugador.radio;
            if (jugador.x + jugador.radio > canvas.width) jugador.x = canvas.width - jugador.radio;
            if (jugador.y - jugador.radio < 0) jugador.y = jugador.radio;
            if (jugador.y + jugador.radio > canvas.height) jugador.y = canvas.height - jugador.radio;

            // Chocar contra muebles/puertas
            for (let obj of objetos) {
                // Encontrar punto más cercano del mueble al jugador redondo
                let cercaX = Math.max(obj.x, Math.min(jugador.x, obj.x + obj.w));
                let cercaY = Math.max(obj.y, Math.min(jugador.y, obj.y + obj.h));
                
                let distX = jugador.x - cercaX;
                let distY = jugador.y - cercaY;
                let distancia = Math.sqrt(distX*distX + distY*distY);

                if (distancia < jugador.radio) {
                    // Rebotar al jugador para que no traspase el mueble
                    if (Math.abs(distX) > Math.abs(distY)) {
                        jugador.x = cercaX + (distX > 0 ? jugador.radio : -jugador.radio);
                    } else {
                        jugador.y = cercaY + (distY > 0 ? jugador.radio : -jugador.radio);
                    }
                    
                    // Activar la inspección del mueble
                    dispararInteraccion(obj);
                }
            }
        }

        function dispararInteraccion(obj) {
            if (panelAbierto) return;

            if (obj.tipo === 'escritorio' && !obj.revisado) {
                obj.revisado = true;
                piezas++;
                document.getElementById('txt-piezas').innerText = piezas;
                logConsola(`> Revisando: ${obj.titulo}.`);
                abrirPopupInformativo(obj.titulo, obj.texto);
            } 
            else if (obj.tipo === 'puerta') {
                if (piezas < 3) {
                    abrirPopupInformativo("Puerta Bloqueada", "El lector requiere los 3 fragmentos de análisis distribuidos en los escritorios.");
                } else {
                    lanzarQuizFinal();
                }
            }
        }

        /* ===================================================
           SISTEMA DE POPUPS Y LÓGICA DE JUEGO (PERSPECTIVA)
           =================================================== */
        const panelPopup = document.getElementById('popup-puzzle');
        const txtConsola = document.getElementById('consola-txt');

        function logConsola(msg) {
            txtConsola.innerHTML += `<br>${msg}`;
            txtConsola.scrollTop = txtConsola.scrollHeight;
        }

        function abrirPopupInformativo(titulo, desc) {
            panelAbierto = true;
            jugador.vx = 0; jugador.vy = 0;
            
            document.getElementById('puzzle-titulo').innerText = titulo;
            document.getElementById('puzzle-desc').innerText = desc;
            
            const opcionesDiv = document.getElementById('contenedor-opciones');
            opcionesDiv.innerHTML = `<button class="btn-opcion" onclick="cerrarPopup()">CONTINUAR EXPLORACIÓN</button>`;
            panelPopup.classList.remove('oculto');
        }

        function cerrarPopup() {
            panelPopup.classList.add('oculto');
            setTimeout(() => { panelAbierto = false; }, 200);
        }

        function lanzarQuizFinal() {
            panelAbierto = true;
            jugador.vx = 0; jugador.vy = 0;
            
            document.getElementById('puzzle-titulo').innerText = "Análisis de Matrices EPN";
            document.getElementById('puzzle-desc').innerText = "Los fragmentos revelan una matriz central Linealmente Dependiente (LD) en los servidores. ¿Cuál es el procedimiento que te enseñaron para resolverla de forma segura?";
            
            const opcionesDiv = document.getElementById('contenedor-opciones');
            opcionesDiv.innerHTML = `
                <button class="btn-opcion" onclick="procesarRespuesta(false)">A) Calcular el determinante de forma directa</button>
                <button class="btn-opcion" onclick="procesarRespuesta(true)">B) Trasponer la matriz primero</button>
            `;
            panelPopup.classList.remove('oculto');
        }

        function procesarRespuesta(esCorrecta) {
            if (esCorrecta) {
                document.getElementById('puzzle-titulo').innerText = "SISTEMA DESBLOQUEADO";
                document.getElementById('puzzle-desc').innerText = "Excelente decisión. La trasposición estabilizó los parámetros. Has superado el simulador de Escape Room con éxito.";
                document.getElementById('contenedor-opciones').innerHTML = `<button class="btn-opcion" onclick="location.reload()">VOLVER AL INICIO</button>`;
            } else {
                // Efecto visual de daño
                const flash = document.getElementById('efecto-daño');
                flash.classList.remove('daño-flash');
                void flash.offsetWidth;
                flash.classList.add('daño-flash');
                
                logConsola("> ERROR: El sistema colapsó por omitir la trasposición.");
                document.getElementById('puzzle-titulo').innerText = "FALLA CRÍTICA";
                document.getElementById('puzzle-desc').innerText = "¡Incidente provocado! Saltarse el procedimiento causó un bucle infinito en el núcleo de datos.";
                document.getElementById('contenedor-opciones').innerHTML = `<button class="btn-opcion" onclick="location.reload()">REINICIAR CUARTO</button>`;
            }
        }

        /* ===================================================
           BUCLE DE RENDERIZADO (GRÁFICOS)
           =================================================== */
        function loopPrincipal() {
            if (!juegoActivo) return;

            // Actualizar posiciones si el juego no está pausado por un popup
            if (!panelAbierto) {
                jugador.x += jugador.vx;
                jugador.y += jugador.vy;
                detectarColisiones();
            }

            // LIMPIAR LIENZO
            ctx.fillStyle = '#09090b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // DIBUJAR ENTORNO (Líneas de rejilla tipo radar/búnker)
            ctx.strokeStyle = '#111115';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=30) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j=0; j<canvas.height; j+=30) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // DIBUJAR MUEBLES (Habitaciones físicas)
            for (let obj of objetos) {
                if (obj.tipo === 'escritorio') {
                    ctx.fillStyle = obj.revisado ? '#222226' : '#3f3f46';
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    ctx.strokeStyle = obj.revisado ? '#444' : '#a855f7';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
                    
                    // Detalle interno de los escritorios
                    ctx.fillStyle = '#18181b';
                    ctx.fillRect(obj.x + 5, obj.y + 5, obj.w - 10, obj.h - 10);
                } 
                else if (obj.tipo === 'puerta') {
                    ctx.fillStyle = (piezas === 3) ? '#a855f7' : '#27272a';
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    ctx.strokeStyle = '#000000';
                    ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
                }
            }

            // DIBUJAR PERSONAJE (Círculo blanco con núcleo morado)
            ctx.beginPath();
            ctx.arc(jugador.x, jugador.y, jugador.radio, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.closePath();
            
            ctx.beginPath();
            ctx.arc(jugador.x, jugador.y, jugador.radio - 5, 0, Math.PI * 2);
            ctx.fillStyle = '#a855f7';
            ctx.fill();
            ctx.closePath();

            requestAnimationFrame(loopPrincipal);
        }
    </script>
</body>
</html>
