<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escape Room - Primera Persona</title>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* --- INTERFAZ DE USUARIO (HUD) --- */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 20px; box-sizing: border-box;
            display: flex; justify-content: space-between;
            z-index: 100; pointer-events: none;
        }
        .vida-container {
            font-size: 20px; font-weight: bold; color: #ff3333;
            text-shadow: 0 0 10px red; display: flex; align-items: center; gap: 10px;
        }
        .barra-vida { width: 150px; height: 15px; background: #333; border: 2px solid #555; }
        .vida-fill { height: 100%; background: #ff3333; width: 100%; transition: 0.3s; }
        .sala-contador { font-size: 24px; color: #a855f7; font-weight: bold; text-shadow: 0 0 10px #a855f7; }

        /* --- ESCENA 3D (PRIMERA PERSONA) --- */
        #escena-3d {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 800px; /* Crea la profundidad 3D */
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 80%);
            transition: background 0.2s;
        }

        /* --- OBJETOS INTERACTIVOS --- */
        .puerta {
            width: 160px; height: 320px;
            background: #2a1c12;
            border: 8px solid #140d08;
            transform: translateZ(-200px); /* Aleja la puerta en el espacio 3D */
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.3s, filter 0.3s;
        }
        .puerta:active { filter: brightness(1.5); }
        .manija {
            position: absolute; right: 15px; top: 50%;
            width: 15px; height: 30px; background: #888; border-radius: 5px;
        }
        
        .texto-puerta {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #a855f7; font-weight: bold; font-size: 14px;
            text-shadow: 0 0 5px #000;
        }

        /* Armario a la izquierda */
        #casillero {
            position: absolute; left: 5%; bottom: -5%;
            width: 120px; height: 400px;
            background: #111; border: 4px solid #222;
            transform: rotateY(35deg); /* Lo gira para dar efecto 3D */
            cursor: pointer;
            box-shadow: inset 20px 0 30px #000;
            display: flex; align-items: center; justify-content: center;
        }
        #casillero::before {
            content: "ARMARIO"; color: #333; font-weight: bold; writing-mode: vertical-rl; text-orientation: upright;
        }
        #casillero:active { background: #000; }

        /* --- EFECTOS VISUALES --- */
        @keyframes temblorDaño {
            0% { transform: translate(0, 0); filter: drop-shadow(0 0 50px red) brightness(2); }
            25% { transform: translate(-20px, 15px); }
            50% { transform: translate(20px, -15px); }
            75% { transform: translate(-10px, 10px); }
            100% { transform: translate(0, 0); filter: none; }
        }
        .daño-efecto { animation: temblorDaño 0.4s ease-in-out; }
        
        @keyframes parpadeoEnte {
            0%, 20%, 40%, 100% { background: radial-gradient(circle at center, #1a1a1a 0%, #000 80%); }
            10%, 30% { background: #3a0000; }
        }
        .luces-fallando { animation: parpadeoEnte 0.5s infinite; }

        @keyframes caminar {
            0% { transform: translateZ(-200px) scale(1); opacity: 1; }
            100% { transform: translateZ(200px) scale(2); opacity: 0; }
        }
        .animacion-entrar { animation: caminar 0.6s forwards; }

        /* --- MENSAJES Y PANTALLAS --- */
        #pantalla-mensaje {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .btn-accion {
            background: transparent; color: #a855f7; border: 2px solid #a855f7;
            padding: 15px 40px; font-size: 20px; font-weight: bold; margin-top: 30px;
            cursor: pointer; border-radius: 5px;
            text-transform: uppercase;
        }
        .oculto { display: none !important; }

        /* Contenedor doble puerta */
        #puertas-duo {
            display: flex; gap: 30px; transform: translateZ(-200px);
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="vida-container">
            ❤️ <div class="barra-vida"><div class="vida-fill" id="vida-barra"></div></div>
        </div>
        <div class="sala-contador">PUERTA <span id="num-sala">000</span></div>
    </div>

    <div id="pantalla-mensaje">
        <h1 style="color: #a855f7; font-size: 40px; text-shadow: 0 0 20px #a855f7;">PROYECTO INGENIA</h1>
        <p style="color: #aaa; text-align: center; max-width: 300px;">Adéntrate en los pasillos de la Politécnica. Si escuchas ruidos o las luces fallan, escóndete en el armario. Si te equivocas de puerta, el sistema te castigará.</p>
        <button class="btn-accion" onclick="iniciarJuego()">ENTRAR AL PASILLO</button>
    </div>

    <div id="escena-3d" class="oculto">
        
        <div id="casillero" onclick="esconderse()" ontouchstart="esconderse()"></div>
        
        <div id="puerta-centro" class="puerta" onclick="abrirPuerta()">
            <div class="manija"></div>
        </div>

        <div id="puertas-duo" class="oculto">
            <div class="puerta" onclick="abrirPuertaPuzzle(false)" style="transform: translateZ(0);">
                <div class="texto-puerta" id="texto-puerta-mala">OPCIÓN A</div>
                <div class="manija" style="left: 15px;"></div>
            </div>
            <div class="puerta" onclick="abrirPuertaPuzzle(true)" style="transform: translateZ(0);">
                <div class="texto-puerta" id="texto-puerta-buena">OPCIÓN B</div>
                <div class="manija"></div>
            </div>
        </div>

    </div>

    <script>
        let vida = 100;
        let sala = 0;
        let estadoSala = 'normal'; // normal, ente, puzzle
        let enteActivo = false;
        let temporizadorEnte;

        const escena = document.getElementById('escena-3d');
        const hudVida = document.getElementById('vida-barra');
        const hudSala = document.getElementById('num-sala');
        const msjPantalla = document.getElementById('pantalla-mensaje');

        function actualizarHUD() {
            hudVida.style.width = vida + '%';
            let num = sala < 10 ? '00' + sala : (sala < 100 ? '0' + sala : sala);
            hudSala.innerText = num;
        }

        function recibirDaño(cantidad, motivo) {
            vida -= cantidad;
            if (vida < 0) vida = 0;
            actualizarHUD();
            
            escena.classList.add('daño-efecto');
            setTimeout(() => escena.classList.remove('daño-efecto'), 400);

            if (vida === 0) {
                mostrarMensaje("HAS MUERTO", motivo, "REINTENTAR", () => location.reload());
            }
        }

        function mostrarMensaje(titulo, texto, txtBoton, accion) {
            msjPantalla.classList.remove('oculto');
            escena.classList.add('oculto');
            msjPantalla.innerHTML = `
                <h1 style="color: #f00; font-size: 40px; text-shadow: 0 0 20px #f00;">${titulo}</h1>
                <p style="color: #aaa; text-align: center; max-width: 300px;">${texto}</p>
                <button class="btn-accion" style="border-color: #f00; color: #f00;" id="btn-msj">${txtBoton}</button>
            `;
            document.getElementById('btn-msj').onclick = accion;
        }

        function iniciarJuego() {
            msjPantalla.classList.add('oculto');
            escena.classList.remove('oculto');
            avanzarSala();
        }

        function avanzarSala() {
            sala++;
            actualizarHUD();
            enteActivo = false;
            escena.classList.remove('luces-fallando');
            clearTimeout(temporizadorEnte);

            // Resetea clases de animación
            document.getElementById('puerta-centro').classList.remove('animacion-entrar');
            document.getElementById('puerta-centro').classList.remove('oculto');
            document.getElementById('puertas-duo').classList.add('oculto');

            // Lógica aleatoria de salas
            let prob = Math.random();
            
            // Cada 4 salas (o 30% de probabilidad) hay un Puzzle Técnico
            if (sala % 4 === 0) {
                generarPuzzle();
            } 
            // 35% de probabilidad de que aparezca El Ente
            else if (prob < 0.35 && sala > 1) {
                estadoSala = 'ente';
                setTimeout(() => {
                    enteActivo = true;
                    escena.classList.add('luces-fallando');
                    
                    // Si no se esconde en 3 segundos, recibe daño
                    temporizadorEnte = setTimeout(() => {
                        if (enteActivo) {
                            escena.classList.remove('luces-fallando');
                            enteActivo = false;
                            recibirDaño(40, "El Ente te atrapó en el pasillo por no esconderte a tiempo.");
                        }
                    }, 3000);
                }, 1000);
            } 
            // Sala Normal
            else {
                estadoSala = 'normal';
            }
        }

        // --- MECÁNICA: ARMARIO ---
        function esconderse() {
            if (estadoSala === 'ente' && enteActivo) {
                // Se escondió a tiempo!
                clearTimeout(temporizadorEnte);
                enteActivo = false;
                escena.classList.remove('luces-fallando');
                // Al salir del armario, avanza automáticamente
                setTimeout(avanzarSala, 500);
            } else if (estadoSala === 'normal') {
                // Se escondió sin razón, pierde tiempo pero no vida
            }
        }

        // --- MECÁNICA: ABRIR PUERTA SIMPLE ---
        function abrirPuerta() {
            if (enteActivo) {
                // Abrió la puerta mientras venía el monstruo
                recibirDaño(50, "Abriste la puerta justo cuando el Ente pasaba. Debiste usar el armario.");
                clearTimeout(temporizadorEnte);
                enteActivo = false;
                escena.classList.remove('luces-fallando');
            } else {
                // Efecto de caminar hacia adelante
                const puerta = document.getElementById('puerta-centro');
                puerta.classList.add('animacion-entrar');
                setTimeout(avanzarSala, 600);
            }
        }

        // --- MECÁNICA: PUZZLE DE INGENIERÍA ---
        function generarPuzzle() {
            estadoSala = 'puzzle';
            document.getElementById('puerta-centro').classList.add('oculto');
            document.getElementById('puertas-duo').classList.remove('oculto');

            const pMala = document.getElementById('texto-puerta-mala');
            const pBuena = document.getElementById('texto-puerta-buena');

            // Dependiendo del nivel, lanza diferentes trampas. 
            // Aquí referenciamos el clásico problema de Álgebra Lineal.
            if (sala <= 4) {
                pMala.innerText = "SISTEMA: Resolver Matriz Directamente";
                pBuena.innerText = "SISTEMA: Trasponer Matriz Primero";
                window.msgErrorPuzzle = "¡Anomalía detectada! A ti te enseñaron a trasponer la matriz primero antes de resolver. El sistema de seguridad te electrocutó.";
            } else {
                pMala.innerText = "LÍQUIDO: Fuerzas de Dispersión";
                pBuena.innerText = "LÍQUIDO: Puentes de Hidrógeno";
                window.msgErrorPuzzle = "Presión inestable. El líquido requería fuerzas intermoleculares más fuertes (Puentes de Hidrógeno).";
            }

            // Aleatorizar el lado de la puerta correcta (50/50)
            if (Math.random() > 0.5) {
                let temp = pMala.innerText;
                pMala.innerText = pBuena.innerText;
                pBuena.innerText = temp;
                document.getElementById('puertas-duo').children[0].setAttribute('onclick', 'abrirPuertaPuzzle(true)');
                document.getElementById('puertas-duo').children[1].setAttribute('onclick', 'abrirPuertaPuzzle(false)');
            } else {
                document.getElementById('puertas-duo').children[0].setAttribute('onclick', 'abrirPuertaPuzzle(false)');
                document.getElementById('puertas-duo').children[1].setAttribute('onclick', 'abrirPuertaPuzzle(true)');
            }
        }

        function abrirPuertaPuzzle(esCorrecta) {
            if (esCorrecta) {
                // Avanza
                avanzarSala();
            } else {
                // Trampa activada
                recibirDaño(35, window.msgErrorPuzzle);
                if (vida > 0) {
                    avanzarSala(); // Te deja pasar pero muy lastimado
                }
            }
        }
    </script>
</body>
</html>
